name: berogames
description: "BeroGames - لعبة مسابقات"
publish_to: 'none'

version: 1.0.13+20

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP
  dio: ^5.4.0

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.2.3

  # Animations
  flutter_animate: ^4.5.0
  confetti: ^0.7.0

  # Fonts
  google_fonts: ^6.2.1

  # Audio
  audioplayers: ^6.0.0

  # Multiplayer - WebSocket
  socket_io_client: ^2.0.3+1

  # Voice Chat - WebRTC
  flutter_webrtc: ^1.0.0
  permission_handler: ^11.3.1

  # Image Picker (اختيار الصور)
  image_picker: ^1.0.7

  # Google Sign-In + Firebase
  google_sign_in: ^6.2.1
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

  # AdMob
  google_mobile_ads: ^5.1.0

  # In-App Purchases (Google Play Billing)
  in_app_purchase: ^3.1.13
  in_app_purchase_android: ^0.3.6+10

  # SVG rendering
  flutter_svg: ^2.0.10+1

  # Localization (multi-language)
  easy_localization: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_neon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#080E1C"
  adaptive_icon_foreground: "assets/images/logo_neon.png"

flutter_native_splash:
  color: "#080E1C"
  image: assets/images/logo_neon.png
  color_dark: "#080E1C"
  image_dark: assets/images/logo_neon.png
  android_12:
    image: assets/images/logo_neon.png
    icon_background_color: "#080E1C"
    image_dark: assets/images/logo_neon.png
    icon_background_color_dark: "#080E1C"
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/
    - assets/sounds/notification/chat_notify.wav
    - assets/sounds/happy/answer-correct.mp3
    - assets/sounds/happy/default_eKkIk7O.mp3
    - assets/sounds/happy/kids_cheering.mp3
    - assets/sounds/happy/omgwow.mp3
    - assets/sounds/happy/original-sheesh.mp3
    - assets/sounds/happy/very-nice-borat.mp3
    - assets/sounds/happy/yeah-boymp4.mp3
    - assets/sounds/sad/ceeday-huh-sound-effect.mp3
    - assets/sounds/sad/fahhhhh-5.mp3
    - assets/sounds/sad/oh_no_1.mp3
    - assets/sounds/sad/ow2-online-audio-converter.mp3
    - assets/sounds/sad/sorry-sorry-sorry.mp3
    - assets/sounds/sad/tf_nemesis.mp3
    - assets/sounds/sad/y2mate_VKI8qDn.mp3
